<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Коран Battle Pass — Общий чат</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.3s;
        }
        
        body.gold-theme { background: radial-gradient(ellipse at 30% 40%, #3d2b1a, #1a0f0a); }
        body.light-theme { background: #f5f5f0; color: #1a1a2e; }
        body.light-theme .sura-card, body.light-theme .quest-item, body.light-theme .shop-item,
        body.light-theme .pass-panel, body.light-theme .sura-content, body.light-theme .chat-container {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            color: #1a1a2e;
        }
        body.light-theme .chat-input { color: #1a1a2e; background: rgba(0,0,0,0.1); }
        body.light-theme .tab-btn { color: #1a1a2e; background: rgba(0,0,0,0.05); }
        body.light-theme .theme-btn { color: #1a1a2e; background: rgba(0,0,0,0.1); }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        
        h1 {
            padding: 20px;
            font-size: 1.8em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }
        
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
        }
        .username { font-weight: 600; font-size: 1.1em; }
        .theme-buttons { display: flex; gap: 8px; }
        .theme-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-size: 0.8em;
        }
        
        .pass-panel {
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .pass-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .pass-level {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .pass-coins { display: flex; align-items: center; gap: 8px; background: rgba(255, 215, 0, 0.15); padding: 6px 16px; border-radius: 40px; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 20px; height: 12px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #ffd700, #ff8c00); width: 0%; height: 100%; transition: width 0.3s; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
        }
        .tab-btn.active { background: rgba(138, 180, 248, 0.4); border-bottom: 2px solid #ffd700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .chat-container {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            height: 450px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-message {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 15px;
            max-width: 80%;
            align-self: flex-start;
        }
        .chat-message.own { align-self: flex-end; background: rgba(255,215,0,0.2); }
        .chat-name { font-size: 0.7em; color: #ffd966; margin-bottom: 4px; }
        .chat-text { font-size: 0.9em; word-break: break-word; }
        .chat-input-area { display: flex; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-input { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 12px; border-radius: 30px; color: white; font-size: 0.9em; }
        .chat-send { background: #ffd700; border: none; padding: 0 20px; border-radius: 30px; cursor: pointer; font-weight: bold; color: #1a1a2e; }
        
        .sura-list, .quest-list, .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .sura-card, .quest-item, .shop-item {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sura-card:hover, .quest-item:hover, .shop-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
        .sura-number { color: #ffd966; font-weight: bold; }
        
        .sura-content {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(32px);
            border-radius: 44px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .sura-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .close-btn { background: rgba(255,85,85,0.3); border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        
        .ayah {
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .ayah.read { background: rgba(138,180,248,0.15); border-left: 3px solid #ffd700; }
        .ayah.reading { background: rgba(255,215,0,0.1); }
        .timer-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #ffd700; width: 0%; transition: width 0.1s linear; }
        .timer-text { position: absolute; top: 5px; right: 10px; font-size: 0.7em; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 20px; }
        
        .arabic { font-family: 'Noto Naskh Arabic', serif; font-size: 1.3em; text-align: right; line-height: 1.7; margin-bottom: 8px; }
        .translation { font-size: 0.85em; color: #ccc; padding-left: 12px; border-left: 2px solid #ffd700; }
        .footer { text-align: center; padding: 20px; font-size: 0.7em; opacity: 0.7; margin-top: 20px; }
        
        .register-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .register-card {
            background: rgba(20,30,50,0.95);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            padding: 30px;
            text-align: center;
            width: 300px;
        }
        .register-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 30px; border: none; background: rgba(255,255,255,0.2); color: white; text-align: center; }
        .register-card button { background: #ffd700; border: none; padding: 12px 24px; border-radius: 30px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .avatar-options { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .avatar-option { font-size: 2em; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .avatar-option.selected { background: rgba(255,215,0,0.3); transform: scale(1.1); }
        
        .loading { text-align: center; padding: 40px; color: #ffd966; }
        
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        .star { position: fixed; top: -20px; font-size: 1.2em; pointer-events: none; z-index: 999; animation: fall linear forwards; }
        
        @media (max-width: 550px) {
            .sura-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .arabic { font-size: 1.1em; }
            .profile-panel { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📖 Электронный Коран</h1></div>

    <div class="profile-panel">
        <div class="profile-info">
            <div class="avatar" id="avatar" onclick="openRegister()">🕌</div>
            <div class="username" id="usernameDisplay">Гость</div>
        </div>
        <div class="theme-buttons">
            <button class="theme-btn" onclick="setTheme('dark')">🌙 Тёмная</button>
            <button class="theme-btn" onclick="setTheme('gold')">✨ Золотая</button>
            <button class="theme-btn" onclick="setTheme('light')">☀️ Светлая</button>
        </div>
    </div>

    <div class="pass-panel">
        <div class="pass-header">
            <div class="pass-level" id="passLevel">Уровень 1</div>
            <div class="pass-coins"><span>🌙</span> <span id="coinCount">0</span></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="passProgress"></div></div>
        <div style="font-size:0.7em; margin-top:5px;" id="expDisplay">Опыт: 0 / 100</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quests')">📋 Квесты</button>
        <button class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
        <button class="tab-btn" onclick="switchTab('chat')">💬 Чат</button>
        <button class="tab-btn" onclick="switchTab('suras')">📖 Суры</button>
    </div>

    <div id="questsTab" class="tab-content active"><div id="questList" class="quest-list"><div class="loading">🌟 Загрузка квестов...</div></div></div>
    <div id="shopTab" class="tab-content"><div id="shopGrid" class="shop-grid"><div class="loading">🛍️ Загрузка магазина...</div></div></div>
    <div id="chatTab" class="tab-content"><div class="chat-container"><div class="chat-messages" id="chatMessages"><div class="loading">💬 Загрузка чата...</div></div><div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="Напиши сообщение..." maxlength="200"><button class="chat-send" onclick="sendMessage()">➤</button></div></div></div>
    <div id="surasTab" class="tab-content"><div id="suraList" class="sura-list"><div class="loading">✨ Загрузка сур...</div></div></div>

    <div id="suraContent" class="sura-content">
        <div class="sura-header"><span id="suraTitle"></span><button class="close-btn" onclick="closeSura()">✕ Закрыть</button></div>
        <div id="suraText"></div>
    </div>

    <div class="footer">Коран | Перевод Кулиева | Общий чат для всех</div>
</div>

<div id="registerOverlay" class="register-overlay" style="display:none;">
    <div class="register-card">
        <h3>📝 Создай профиль</h3>
        <input type="text" id="regName" placeholder="Твой никнейм" maxlength="20">
        <div class="avatar-options" id="avatarOptions"></div>
        <button onclick="registerUser()">✅ Начать</button>
        <button onclick="closeRegister()" style="background:#555;">❌ Закрыть</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ЧАТА — ЗАМЕНИ НА СВОИ ССЫЛКИ! ==========
    const CHAT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9eyGXKyHDXQtUkFiGfyP8PH4OEGxTXSwlhUWzCZI3Bxr8oYm_lLKKMmkv64q6t25oE29irFTg-qj5/pubhtml";
    const CHAT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzI_7HbTAiQa779fsUIDho_w7-218-PboKtqvvByxvhL0Xgbo-yPqLGA2YM9abkbUWcqw/exec";
    // ===============================================================
    
    // === ТЕМЫ ===
    function setTheme(theme) {
        document.body.classList.remove('dark-theme', 'gold-theme', 'light-theme');
        if (theme === 'dark') document.body.classList.add('dark-theme');
        else if (theme === 'gold') document.body.classList.add('gold-theme');
        else if (theme === 'light') document.body.classList.add('light-theme');
        localStorage.setItem('quran_theme', theme);
    }
    const savedTheme = localStorage.getItem('quran_theme') || 'dark';
    setTheme(savedTheme);
    
    // === ПРОФИЛЬ ===
    let userProfile = { name: 'Гость', avatar: '🕌', userId: null };
    const avatars = ['🕌', '🌟', '🕋', '🌙', '📖', '🤲', '⭐', '💚', '🕊️', '👑'];
    
    function loadProfile() {
        const saved = localStorage.getItem('quran_profile');
        if (saved) {
            userProfile = JSON.parse(saved);
            document.getElementById('usernameDisplay').innerText = userProfile.name;
            document.getElementById('avatar').innerText = userProfile.avatar;
        }
        if (!userProfile.userId) userProfile.userId = 'user_' + Math.random().toString(36).substr(2, 9);
    }
    
    function openRegister() {
        const overlay = document.getElementById('registerOverlay');
        const optionsDiv = document.getElementById('avatarOptions');
        optionsDiv.innerHTML = '';
        avatars.forEach(ava => {
            const div = document.createElement('div');
            div.className = 'avatar-option';
            div.innerText = ava;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('regName').dataset.selectedAvatar = ava;
            };
            optionsDiv.appendChild(div);
        });
        document.getElementById('regName').value = userProfile.name !== 'Гость' ? userProfile.name : '';
        overlay.style.display = 'flex';
    }
    
    function closeRegister() { document.getElementById('registerOverlay').style.display = 'none'; }
    
    function registerUser() {
        let name = document.getElementById('regName').value.trim();
        if (!name) name = 'Путник';
        if (name.length > 20) name = name.slice(0,20);
        let avatar = document.querySelector('.avatar-option.selected')?.innerText || avatars[0];
        userProfile = { name: name, avatar: avatar, userId: userProfile.userId };
        localStorage.setItem('quran_profile', JSON.stringify(userProfile));
        document.getElementById('usernameDisplay').innerText = name;
        document.getElementById('avatar').innerText = avatar;
        closeRegister();
        renderShop();
    }
    
    // === PASS СИСТЕМА ===
    let passData = { level: 1, exp: 0, coins: 0, ownedItems: [] };
    const EXP_PER_LEVEL = 100;
    const MAX_LEVEL = 20;
    const levelRewards = { 5: 50, 10: 100, 15: 150, 20: 200 };
    
    const shopItems = [
        { id: 'theme_gold', name: 'Золотая тема', icon: '✨', price: 100, apply: () => setTheme('gold') },
        { id: 'icon_crown', name: 'Корона', icon: '👑', price: 50, apply: () => {} },
        { id: 'effect_stars', name: 'Звёзды', icon: '⭐', price: 75, apply: () => startStars() },
        { id: 'border_glow', name: 'Свечение', icon: '🌟', price: 120, apply: () => document.body.classList.add('glow-effect') }
    ];
    
    let starInterval = null;
    function startStars() {
        if (starInterval) return;
        starInterval = setInterval(() => {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = ['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
            star.style.left = Math.random() * 100 + '%';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }, 3000);
    }
    
    function loadPassData() {
        const saved = localStorage.getItem('quran_pass');
        if (saved) passData = JSON.parse(saved);
        if (passData.ownedItems.includes('effect_stars')) startStars();
        updatePassUI();
    }
    function savePassData() { localStorage.setItem('quran_pass', JSON.stringify(passData)); }
    
    function addExp(amount) {
        passData.exp += amount;
        while (passData.exp >= EXP_PER_LEVEL && passData.level < MAX_LEVEL) {
            passData.exp -= EXP_PER_LEVEL;
            passData.level++;
            if (levelRewards[passData.level]) {
                passData.coins += levelRewards[passData.level];
                showNotif(`🎉 Уровень ${passData.level}! +${levelRewards[passData.level]} 🌙`);
            } else showNotif(`🎉 Уровень ${passData.level}!`);
        }
        if (passData.level >= MAX_LEVEL) passData.exp = 0;
        updatePassUI();
        savePassData();
        renderShop();
    }
    
    function addCoins(amount) { passData.coins += amount; updatePassUI(); savePassData(); renderShop(); showNotif(`+${amount} 🌙`, 1000); }
    function updatePassUI() {
        document.getElementById('passLevel').innerHTML = (passData.ownedItems.includes('icon_crown') ? '👑 ' : '') + 'Уровень ' + passData.level;
        document.getElementById('coinCount').innerText = passData.coins;
        document.getElementById('passProgress').style.width = `${(passData.exp/EXP_PER_LEVEL)*100}%`;
        document.getElementById('expDisplay').innerText = `Опыт: ${passData.exp} / ${EXP_PER_LEVEL}`;
    }
    function showNotif(msg, dur=2000) {
        const n = document.createElement('div');
        n.innerText = msg;
        n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a2e;padding:10px 20px;border-radius:40px;z-index:1001;animation:fadeOut 2s forwards;';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), dur);
    }
    
    // === КВЕСТЫ ===
    let quests = [
        { id: 'read10', name: '📖 10 аятов', target: 10, current: 0, reward: 20, completed: false, type: 'ayat' },
        { id: 'read50', name: '📚 50 аятов', target: 50, current: 0, reward: 50, completed: false, type: 'ayat' },
        { id: 'sura1', name: '🌟 Аль-Фатиха', target: 1, current: 0, reward: 30, completed: false, type: 'sura', suraId: 1 },
        { id: 'sura112', name: '🤲 Аль-Ихлас', target: 1, current: 0, reward: 25, completed: false, type: 'sura', suraId: 112 }
    ];
    
    function loadQuests() {
        const saved = localStorage.getItem('quran_quests');
        if (saved) {
            const sq = JSON.parse(saved);
            quests.forEach(q => { const f = sq.find(s => s.id === q.id); if(f) { q.current = f.current; q.completed = f.completed; } });
        }
        renderQuests();
    }
    function saveQuests() { localStorage.setItem('quran_quests', JSON.stringify(quests.map(q => ({ id: q.id, current: q.current, completed: q.completed })))); }
    
    function updateQuestProgress(type, val) {
        quests.forEach(q => {
            if (q.completed) return;
            if (type === 'ayat' && q.type === 'ayat') {
                q.current = Math.min(q.current + val, q.target);
                if (q.current >= q.target && !q.completed) {
                    q.completed = true;
                    addCoins(q.reward);
                    addExp(15);
                    showNotif(`✅ Квест: +${q.reward} 🌙`);
                }
            }
            if (type === 'sura' && q.type === 'sura' && q.suraId === val && !q.completed) {
                q.completed = true;
                addCoins(q.reward);
                addExp(20);
                showNotif(`✅ Квест: +${q.reward} 🌙`);
            }
        });
        renderQuests();
        saveQuests();
    }
    
    function renderQuests() {
        const c = document.getElementById('questList');
        if (!c) return;
        c.innerHTML = '';
        quests.forEach(q => {
            const percent = (q.current / q.target) * 100;
            c.innerHTML += `<div class="quest-item">
                <div style="flex:2">
                    <div>${q.name}</div>
                    <div style="font-size:0.8em;">${q.current}/${q.target}</div>
                    <div class="progress-bar" style="margin-top:5px;"><div class="progress-fill" style="width:${percent}%;background:#ffd700;"></div></div>
                </div>
                <div>🌙 ${q.reward}</div>
                <div class="${q.completed ? 'quest-btn completed' : 'quest-btn'}" ${q.completed ? '' : 'onclick="claimQuest(\''+q.id+'\')"'}>${q.completed ? '✅ Выполнен' : '🏆 Забрать'}</div>
            </div>`;
        });
    }
    
    function claimQuest(id) {
        const q = quests.find(q => q.id === id);
        if (q && q.current >= q.target && !q.completed) {
            q.completed = true;
            addCoins(q.reward);
            addExp(15);
            renderQuests();
            saveQuests();
            showNotif(`✅ +${q.reward} 🌙`);
        } else showNotif('📖 Сначала выполни квест');
    }
    
    // === МАГАЗИН ===
    function renderShop() {
        const c = document.getElementById('shopGrid');
        if (!c) return;
        c.innerHTML = '';
        shopItems.forEach(item => {
            const owned = passData.ownedItems.includes(item.id);
            c.innerHTML += `<div class="shop-item ${owned ? 'owned' : ''}" onclick="buyItem('${item.id}')">
                <div>${item.icon}</div>
                <div>${item.name}</div>
                <div>🌙 ${item.price}</div>
                ${owned ? '<div style="font-size:0.7em;">✅</div>' : ''}
            </div>`;
        });
    }
    
    function buyItem(id) {
        const item = shopItems.find(i => i.id === id);
        if (!item) return;
        if (passData.ownedItems.includes(id)) { showNotif('Уже куплено'); return; }
        if (passData.coins >= item.price) {
            passData.coins -= item.price;
            passData.ownedItems.push(id);
            savePassData();
            if (item.apply) item.apply();
            renderShop();
            updatePassUI();
            showNotif(`🎉 Куплено: ${item.name}`);
        } else showNotif(`❌ Нужно ${item.price} 🌙`);
    }
    
    // === ФИЛЬТР МАТА ===
    const badWords = ['дурак', 'идиот', 'тупой', 'хер', 'редиска', 'заткнись', 'пошел', 'урод', 'тупая', 'идиотина'];
    function filterMessage(text) {
        let filtered = text;
        badWords.forEach(word => { filtered = filtered.replace(new RegExp(word, 'gi'), '***'); });
        return filtered;
    }
    
    // === ОБЩИЙ ЧАТ ===
    async function loadMessages() {
        try {
            const response = await fetch(CHAT_CSV_URL + '?t=' + Date.now());
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            const messages = [];
            for (let i = rows.length - 1; i >= 0; i--) {
                const row = rows[i];
                if (!row.trim()) continue;
                const parts = row.split(',');
                if (parts.length >= 4) {
                    messages.push({
                        time: parts[0],
                        name: parts[1]?.replace(/^"|"$/g, '') || 'Аноним',
                        avatar: parts[2]?.replace(/^"|"$/g, '') || '🕌',
                        text: parts[3]?.replace(/^"|"$/g, '') || '',
                        userId: parts[4]?.replace(/^"|"$/g, '') || ''
                    });
                }
            }
            renderChatMessages(messages.slice(-50).reverse());
        } catch(e) {
            console.error('Ошибка загрузки чата:', e);
            document.getElementById('chatMessages').innerHTML = '<div class="loading">⚠️ Ошибка загрузки чата</div>';
        }
    }
    
    function renderChatMessages(messages) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        if (messages.length === 0) {
            container.innerHTML = '<div class="loading">💬 Пока нет сообщений. Напиши что-нибудь!</div>';
            return;
        }
        container.innerHTML = '';
        messages.forEach(msg => {
            const isOwn = msg.userId === userProfile.userId;
            container.innerHTML += `<div class="chat-message ${isOwn ? 'own' : ''}">
                <div class="chat-name">${msg.avatar} ${msg.name}</div>
                <div class="chat-text">${escapeHtml(msg.text)}</div>
            </div>`;
        });
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        let text = input.value.trim();
        if (!text) return;
        if (!userProfile.name || userProfile.name === 'Гость') { showNotif('Сначала зарегистрируйся!'); openRegister(); return; }
        text = filterMessage(text);
        if (text.length > 200) text = text.slice(0,200);
        
        const msgData = { name: userProfile.name, avatar: userProfile.avatar, text: text, userId: userProfile.userId };
        try {
            await fetch(CHAT_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(msgData) });
            input.value = '';
            setTimeout(() => loadMessages(), 500);
        } catch(e) { console.error('Ошибка отправки:', e); showNotif('❌ Ошибка отправки'); }
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // === ЧТЕНИЕ СУР ===
    let currentSura = null;
    let activeTimers = {};
    
    const suraNames = {

        6:"Аль-Анам",7:"Аль-Араф",8:"Аль-Анфаль",9:"Ат-Тауба",10:"Йунус",
        11:"Худ",12:"Йусуф",13:"Ар-Рад",14:"Ибрахим",15:"Аль-Хиджр",
        16:"Ан-Нахль",17:"Аль-Исра",18:"Аль-Кахф",19:"Марьям",20:"Та Ха",
        21:"Аль-Анбия",22:"Аль-Хаджж",23:"Аль-Муминун",24:"Ан-Нур",25:"Аль-Фуркан",
        26:"Аш-Шуара",27:"Ан-Намль",28:"Аль-Касас",29:"Аль-Анкабут",30:"Ар-Рум",
        31:"Лукман",32:"Ас-Саджда",33:"Аль-Ахзаб",34:"Саба",35:"Фатир",

    };
    
    async function loadSuraList() {
        const c = document.getElementById('suraList');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 1; i <= 114; i++) {
            const card = document.createElement('div');
            card.className = 'sura-card';
            card.onclick = () => loadSura(i);
            card.innerHTML = `<span class="sura-number">${i}.</span> <span>${suraNames[i]}</span>`;
            c.appendChild(card);
        }
    }
    
    function startAyahTimer(ayahDiv, idx) {
        if (activeTimers[idx]) return;
        let timeLeft = 8;
        ayahDiv.classList.add('reading');
        let tb = ayahDiv.querySelector('.timer-bar');
        let tt = ayahDiv.querySelector('.timer-text');
        if (!tb) { tb = document.createElement('div'); tb.className = 'timer-bar'; tt = document.createElement('div'); tt.className = 'timer-text'; ayahDiv.appendChild(tb); ayahDiv.appendChild(tt); }
        const interval = setInterval(() => {
            timeLeft -= 0.1;
            const percent = ((8 - timeLeft) / 8) * 100;
            tb.style.width = `${percent}%`;
            tt.innerText = `${Math.ceil(timeLeft)}с`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                delete activeTimers[idx];
                ayahDiv.classList.remove('reading');
                if (tb) tb.remove();
                if (tt) tt.remove();
                if (!ayahDiv.classList.contains('read')) {
                    ayahDiv.classList.add('read');
                    const key = `quran_sura_${currentSura}_ayahs`;
                    let read = JSON.parse(localStorage.getItem(key)) || [];
                    if (!read.includes(idx)) {
                        read.push(idx);
                        localStorage.setItem(key, JSON.stringify(read));
                        updateQuestProgress('ayat', 1);
                        addExp(2);
                        showNotif(`📖 Аят ${idx} прочитан! +2 опыта`, 1000);
                        const total = document.querySelectorAll('.ayah').length;
                        if (read.length === total) updateQuestProgress('sura', currentSura);
                    }
                }
            }
        }, 100);
        activeTimers[idx] = interval;
    }
    
    function stopAyahTimer(idx) {
        if (activeTimers[idx]) {
            clearInterval(activeTimers[idx]);
            delete activeTimers[idx];
            const div = document.querySelector(`.ayah[data-ayah="${idx}"]`);
            if (div) {
                div.classList.remove('reading');
                const tb = div.querySelector('.timer-bar');
                const tt = div.querySelector('.timer-text');
                if (tb) tb.remove();
                if (tt) tt.remove();
            }
        }
    }
    
    function initAyahs() {
        document.querySelectorAll('.ayah').forEach((a, idx) => {
            const i = idx + 1;
            a.setAttribute('data-ayah', i);
            a.onmouseenter = () => startAyahTimer(a, i);
            a.onmouseleave = () => stopAyahTimer(i);
            a.ontouchstart = (e) => { e.preventDefault(); startAyahTimer(a, i); };
            a.ontouchend = () => stopAyahTimer(i);
        });
    }
    
    function loadReadAyahs() {
        const key = `quran_sura_${currentSura}_ayahs`;
        const read = JSON.parse(localStorage.getItem(key)) || [];
        document.querySelectorAll('.ayah').forEach((a, idx) => { if (read.includes(idx + 1)) a.classList.add('read'); });
    }
    
    async function loadSura(num) {
        currentSura = num;
        const cont = document.getElementById('suraContent');
        const textDiv = document.getElementById('suraText');
        const titleSpan = document.getElementById('suraTitle');
        cont.style.display = 'block';
        textDiv.innerHTML = '<div class="loading">🌙 Загрузка...</div>';
        titleSpan.innerHTML = `${num}. ${suraNames[num]}`;
        cont.scrollIntoView({ behavior: 'smooth' });
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/ru.kuliev`);
            const data = await res.json();
            if (data.status === 'OK') {
                let html = '';
                data.data.ayahs.forEach((a, i) => { html += `<div class="ayah"><div class="arabic">${a.text}</div><div class="translation">${i+1}. ${a.translation}</div></div>`; });
                textDiv.innerHTML = html;
                loadReadAyahs();
                initAyahs();
                localStorage.setItem('quran_bookmark_sura', num);
            } else textDiv.innerHTML = '<div class="loading">⚠️ Ошибка</div>';
        } catch(e) { textDiv.innerHTML = '<div class="loading">🔌 Ошибка соединения</div>'; }
    }
    
    function closeSura() { document.getElementById('suraContent').style.display = 'none'; currentSura = null; }
    
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        if (tab === 'quests') btns[0].classList.add('active');
        else if (tab === 'shop') { btns[1].classList.add('active'); renderShop(); }
        else if (tab === 'chat') { btns[2].classList.add('active'); loadMessages(); setInterval(loadMessages, 5000); }
        else if (tab === 'suras') { btns[3].classList.add('active'); loadSuraList(); }
    }
    
    // Запуск
    loadProfile();
    loadPassData();
    loadQuests();
    loadSuraList();
    
    window.setTheme = setTheme;
    window.switchTab = switchTab;
    window.claimQuest = claimQuest;
    window.buyItem = buyItem;
    window.openRegister = openRegister;
    window.closeRegister = closeRegister;
    window.registerUser = registerUser;
    window.sendMessage = sendMessage;
    window.loadSura = loadSura;
    window.closeSura = closeSura;
</script>
