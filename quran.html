<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Коран — Квесты и титулы</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.3s;
        }
        
        body.gold-theme { background: radial-gradient(ellipse at 30% 40%, #3d2b1a, #1a0f0a); }
        body.light-theme { background: #f5f5f0; color: #1a1a2e; }
        body.light-theme .sura-card, body.light-theme .quest-item, body.light-theme .pass-panel,
        body.light-theme .sura-content, body.light-theme .profile-panel, body.light-theme .stats-card,
        body.light-theme .leader-card {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            color: #1a1a2e;
        }
        body.light-theme .tab-btn { color: #1a1a2e; background: rgba(0,0,0,0.05); }
        body.light-theme .theme-btn { color: #1a1a2e; background: rgba(0,0,0,0.1); }
        
        .glow-title {
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { text-shadow: 0 0 5px #fff; }
            50% { text-shadow: 0 0 20px #fff, 0 0 30px #fff; }
            100% { text-shadow: 0 0 5px #fff; }
        }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        
        h1 {
            padding: 20px;
            font-size: 1.8em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }
        
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        .username { font-weight: 600; font-size: 1.1em; }
        .theme-buttons { display: flex; gap: 8px; }
        .theme-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-size: 0.8em;
        }
        
        .stats-card {
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .prestige-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
        }
        .user-title {
            font-size: 1.1em;
            margin: 10px 0;
            padding: 8px;
            border-radius: 30px;
            display: inline-block;
        }
        
        .pass-panel {
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .pass-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .pass-level {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .pass-coins { display: flex; align-items: center; gap: 8px; background: rgba(255, 215, 0, 0.15); padding: 6px 16px; border-radius: 40px; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 20px; height: 12px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #ffd700, #ff8c00); width: 0%; height: 100%; transition: width 0.3s; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
        }
        .tab-btn.active { background: rgba(138, 180, 248, 0.4); border-bottom: 2px solid #ffd700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .leader-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
        }
        .leader-rank { width: 50px; font-weight: bold; font-size: 1.2em; }
        .leader-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .leader-info { flex: 1; }
        .leader-name { font-weight: 600; }
        .leader-reads { font-size: 0.8em; opacity: 0.7; }
        .leader-title { font-size: 0.7em; color: #ffd966; margin-top: 3px; }
        
        .sura-list, .quest-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .sura-card, .quest-item {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sura-card:hover, .quest-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
        .sura-number { color: #ffd966; font-weight: bold; }
        
        .sura-content {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(32px);
            border-radius: 44px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .sura-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .close-btn { background: rgba(255,85,85,0.3); border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        
        .ayah {
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .ayah.read { background: rgba(138,180,248,0.15); border-left: 3px solid #ffd700; }
        .ayah.reading { background: rgba(255,215,0,0.1); }
        .timer-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #ffd700; width: 0%; transition: width 0.1s linear; }
        .timer-text { position: absolute; top: 5px; right: 10px; font-size: 0.7em; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 20px; }
        
        .arabic { font-family: 'Noto Naskh Arabic', serif; font-size: 1.3em; text-align: right; line-height: 1.7; margin-bottom: 8px; }
        .translation { font-size: 0.85em; color: #ccc; padding-left: 12px; border-left: 2px solid #ffd700; }
        .footer { text-align: center; padding: 20px; font-size: 0.7em; opacity: 0.7; margin-top: 20px; }
        
        .quest-badge {
            display: inline-block;
            font-size: 0.7em;
            background: rgba(255,215,0,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
        }
        .quest-badge.daily { background: rgba(138,180,248,0.3); }
        .quest-badge.weekly { background: rgba(255,100,100,0.3); }
        
        .loading { text-align: center; padding: 40px; color: #ffd966; }
        
        @media (max-width: 550px) {
            .sura-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .arabic { font-size: 1.1em; }
            .leader-card { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📖 Электронный Коран</h1></div>

    <div class="profile-panel">
        <div class="profile-info">
            <div class="avatar">🕌</div>
            <div class="username">Читатель</div>
        </div>
        <div class="theme-buttons">
            <button class="theme-btn" onclick="setTheme('dark')">🌙 Тёмная</button>
            <button class="theme-btn" onclick="setTheme('gold')">✨ Золотая</button>
            <button class="theme-btn" onclick="setTheme('light')">☀️ Светлая</button>
        </div>
    </div>

    <div class="stats-card">
        <div style="font-size: 0.8em; opacity: 0.7;">ПРЕСТИЖ</div>
        <div class="prestige-number" id="prestigeCount">0</div>
        <div class="user-title" id="userTitle"></div>
        <div style="margin-top: 10px;">📖 Полных прочтений Корана: <strong id="fullReadsCount">0</strong></div>
    </div>

    <div class="pass-panel">
        <div class="pass-header">
            <div class="pass-level" id="passLevel">Уровень 1</div>
            <div class="pass-coins"><span>🌙</span> <span id="coinCount">0</span></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="passProgress"></div></div>
        <div style="font-size:0.7em; margin-top:5px;" id="expDisplay">Опыт: 0 / 100</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quests')">📋 Квесты</button>
        <button class="tab-btn" onclick="switchTab('leaders')">🏆 Лидеры</button>
        <button class="tab-btn" onclick="switchTab('suras')">📖 Суры</button>
    </div>

    <div id="questsTab" class="tab-content active"><div id="questList" class="quest-list"><div class="loading">🌟 Загрузка квестов...</div></div></div>
    <div id="leadersTab" class="tab-content"><div id="leadersList" class="quest-list"><div class="loading">🏆 Загрузка лидеров...</div></div></div>
    <div id="surasTab" class="tab-content"><div id="suraList" class="sura-list"><div class="loading">✨ Загрузка сур...</div></div></div>

    <div id="suraContent" class="sura-content">
        <div class="sura-header"><span id="suraTitle"></span><button class="close-btn" onclick="closeSura()">✕ Закрыть</button></div>
        <div id="suraText"></div>
    </div>

    <div class="footer">Коран | Перевод Кулиева | Ежедневные и еженедельные квесты</div>
</div>

<script>
    // === ТЕМЫ ===
    function setTheme(theme) {
        document.body.classList.remove('dark-theme', 'gold-theme', 'light-theme');
        if (theme === 'dark') document.body.classList.add('dark-theme');
        else if (theme === 'gold') document.body.classList.add('gold-theme');
        else if (theme === 'light') document.body.classList.add('light-theme');
        localStorage.setItem('quran_theme', theme);
    }
    const savedTheme = localStorage.getItem('quran_theme') || 'dark';
    setTheme(savedTheme);
    
    // === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
    let fullReads = parseInt(localStorage.getItem('quran_full_reads')) || 0;
    let currentSura = null;
    let activeTimers = {};
    let passData = { level: 1, exp: 0, coins: 0 };
    
    document.getElementById('fullReadsCount').innerText = fullReads;
    document.getElementById('prestigeCount').innerText = fullReads;
    
    // === ТИТУЛЫ ===
    function getTitle(reads) {
        if (reads >= 100) return "✨ Великий ✨";
        if (reads >= 50) return "💎 Хранитель Корана";
        if (reads >= 25) return "👑 Наставник";
        if (reads >= 10) return "🔥 Мастер чтения";
        if (reads >= 5) return "⭐ Лучший из чтецов";
        if (reads >= 1) return "📖 Чтец";
        return "";
    }
    
    function updateTitle() {
        const title = getTitle(fullReads);
        const titleDiv = document.getElementById('userTitle');
        titleDiv.innerText = title;
        if (title === "✨ Великий ✨") {
            titleDiv.classList.add('glow-title');
        } else {
            titleDiv.classList.remove('glow-title');
        }
    }
    updateTitle();
    
    function saveFullReads() {
        localStorage.setItem('quran_full_reads', fullReads);
        document.getElementById('fullReadsCount').innerText = fullReads;
        document.getElementById('prestigeCount').innerText = fullReads;
        updateTitle();
    }
    
    function addFullRead() {
        fullReads++;
        saveFullReads();
        updateLeaders();
        showNotif(`🎉 Полное прочтение Корана! +1 престиж!`, 3000);
        if (fullReads === 1) showNotif(`🏅 Получен титул "Чтец"!`, 2000);
        if (fullReads === 5) showNotif(`🏅 Получен титул "Лучший из чтецов"!`, 2000);
        if (fullReads === 10) showNotif(`🏅 Получен титул "Мастер чтения"!`, 2000);
        if (fullReads === 25) showNotif(`🏅 Получен титул "Наставник"!`, 2000);
        if (fullReads === 50) showNotif(`🏅 Получен титул "Хранитель Корана"!`, 2000);
        if (fullReads === 100) showNotif(`🏅 Получен титул "Великий"! ✨`, 3000);
    }
    
    // === PASS СИСТЕМА ===
    function loadPassData() {
        const saved = localStorage.getItem('quran_pass');
        if (saved) passData = JSON.parse(saved);
        updatePassUI();
    }
    function savePassData() { localStorage.setItem('quran_pass', JSON.stringify(passData)); }
    
    function addExp(amount) {
        passData.exp += amount;
        while (passData.exp >= 100 && passData.level < 20) {
            passData.exp -= 100;
            passData.level++;
            showNotif(`🎉 Уровень ${passData.level}!`);
        }
        if (passData.level >= 20) passData.exp = 0;
        updatePassUI();
        savePassData();
    }
    
    function addCoins(amount) { passData.coins += amount; updatePassUI(); savePassData(); showNotif(`+${amount} 🌙`, 1000); }
    function updatePassUI() {
        document.getElementById('passLevel').innerText = 'Уровень ' + passData.level;
        document.getElementById('coinCount').innerText = passData.coins;
        document.getElementById('passProgress').style.width = `${(passData.exp / 100) * 100}%`;
        document.getElementById('expDisplay').innerText = `Опыт: ${passData.exp} / 100`;
    }
    
    function showNotif(msg, dur = 2000) {
        const n = document.createElement('div');
        n.innerText = msg;
        n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a2e;padding:10px 20px;border-radius:40px;z-index:1001;animation:fadeOut 2s forwards;';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), dur);
    }
    
    // === ЕЖЕДНЕВНЫЕ И ЕЖЕНЕДЕЛЬНЫЕ КВЕСТЫ ===
    function getDailyResetKey() { return 'quran_daily_reset_' + new Date().toISOString().slice(0,10); }
    function getWeeklyResetKey() { 
        const now = new Date();
        const startOfWeek = new Date(now.getFullYear(), 0, now.getDate() - now.getDay());
        return 'quran_weekly_reset_' + startOfWeek.toISOString().slice(0,10);
    }
    
    let dailyQuests = [
        { id: 'daily_ayat10', name: '📖 Прочитай 10 аятов', target: 10, current: 0, reward: 30, completed: false, type: 'ayat', badge: 'daily' },
        { id: 'daily_ayat30', name: '📚 Прочитай 30 аятов', target: 30, current: 0, reward: 50, completed: false, type: 'ayat', badge: 'daily' },
        { id: 'daily_sura', name: '🌟 Прочитай любую суру полностью', target: 1, current: 0, reward: 40, completed: false, type: 'sura_complete', badge: 'daily' }
    ];
    
    let weeklyQuests = [
        { id: 'weekly_ayat100', name: '📖 Прочитай 100 аятов за неделю', target: 100, current: 0, reward: 150, completed: false, type: 'ayat', badge: 'weekly' },
        { id: 'weekly_ayat300', name: '📚 Прочитай 300 аятов за неделю', target: 300, current: 0, reward: 300, completed: false, type: 'ayat', badge: 'weekly' },
        { id: 'weekly_suras3', name: '🌟 Прочитай 3 суры полностью', target: 3, current: 0, reward: 200, completed: false, type: 'sura_complete_count', badge: 'weekly' },
        { id: 'weekly_sura112', name: '🤲 Прочитай суру Аль-Ихлас', target: 1, current: 0, reward: 50, completed: false, type: 'sura', suraId: 112, badge: 'weekly' },
        { id: 'weekly_sura36', name: '💚 Прочитай суру Йа Син', target: 1, current: 0, reward: 100, completed: false, type: 'sura', suraId: 36, badge: 'weekly' }
    ];
    
    let completedSurasCount = 0;
    
    function checkAndResetQuests() {
        // Ежедневные квесты
        const dailyKey = getDailyResetKey();
        const savedDailyReset = localStorage.getItem('quran_daily_reset_key');
        if (savedDailyReset !== dailyKey) {
            dailyQuests.forEach(q => { q.current = 0; q.completed = false; });
            localStorage.setItem('quran_daily_reset_key', dailyKey);
            localStorage.removeItem('quran_daily_quests');
            showNotif('📅 Ежедневные квесты обновлены!', 2000);
        }
        
        // Еженедельные квесты
        const weeklyKey = getWeeklyResetKey();
        const savedWeeklyReset = localStorage.getItem('quran_weekly_reset_key');
        if (savedWeeklyReset !== weeklyKey) {
            weeklyQuests.forEach(q => { q.current = 0; q.completed = false; });
            completedSurasCount = 0;
            localStorage.setItem('quran_weekly_reset_key', weeklyKey);
            localStorage.removeItem('quran_weekly_quests');
            localStorage.removeItem('quran_weekly_sura_count');
            showNotif('📅 Еженедельные квесты обновлены!', 2000);
        }
        
        // Загружаем сохранённые прогрессы
        const savedDaily = localStorage.getItem('quran_daily_quests');
        if (savedDaily) {
            const sd = JSON.parse(savedDaily);
            dailyQuests.forEach(q => { const f = sd.find(s => s.id === q.id); if (f) { q.current = f.current; q.completed = f.completed; } });
        }
        
        const savedWeekly = localStorage.getItem('quran_weekly_quests');
        if (savedWeekly) {
            const sw = JSON.parse(savedWeekly);
            weeklyQuests.forEach(q => { const f = sw.find(s => s.id === q.id); if (f) { q.current = f.current; q.completed = f.completed; } });
        }
        
        completedSurasCount = parseInt(localStorage.getItem('quran_weekly_sura_count')) || 0;
    }
    
    function saveQuests() {
        localStorage.setItem('quran_daily_quests', JSON.stringify(dailyQuests.map(q => ({ id: q.id, current: q.current, completed: q.completed }))));
        localStorage.setItem('quran_weekly_quests', JSON.stringify(weeklyQuests.map(q => ({ id: q.id, current: q.current, completed: q.completed }))));
        localStorage.setItem('quran_weekly_sura_count', completedSurasCount);
    }
    
    function updateQuestProgress(type, value, suraId = null) {
        let updated = false;
        
        // Ежедневные квесты
        dailyQuests.forEach(q => {
            if (q.completed) return;
            if (type === 'ayat' && q.type === 'ayat') {
                q.current = Math.min(q.current + value, q.target);
                if (q.current >= q.target && !q.completed) {
                    q.completed = true;
                    addCoins(q.reward);
                    addExp(15);
                    showNotif(`✅ Ежедневный квест выполнен! +${q.reward} 🌙`);
                }
                updated = true;
            }
            if (type === 'sura_complete' && q.type === 'sura_complete') {
                q.current = Math.min(q.current + 1, q.target);
                if (q.current >= q.target && !q.completed) {
                    q.completed = true;
                    addCoins(q.reward);
                    addExp(15);
                    showNotif(`✅ Ежедневный квест выполнен! +${q.reward} 🌙`);
                }
                updated = true;
            }
        });
        
        // Еженедельные квесты
        weeklyQuests.forEach(q => {
            if (q.completed) return;
            if (type === 'ayat' && q.type === 'ayat') {
                q.current = Math.min(q.current + value, q.target);
                if (q.current >= q.target && !q.completed) {
                    q.completed = true;
                    addCoins(q.reward);
                    addExp(20);
                    showNotif(`✅ Еженедельный квест выполнен! +${q.reward} 🌙`);
                }
                updated = true;
            }
            if (type === 'sura' && q.type === 'sura' && q.suraId === suraId && !q.completed) {
                q.completed = true;
                addCoins(q.reward);
                addExp(20);
                showNotif(`✅ Еженедельный квест выполнен! +${q.reward} 🌙`);
                updated = true;
            }
            if (type === 'sura_complete_count' && q.type === 'sura_complete_count') {
                q.current = Math.min(q.current + 1, q.target);
                if (q.current >= q.target && !q.completed) {
                    q.completed = true;
                    addCoins(q.reward);
                    addExp(20);
                    showNotif(`✅ Еженедельный квест выполнен! +${q.reward} 🌙`);
                }
                updated = true;
            }
        });
        
        if (updated) {
            renderQuests();
            saveQuests();
        }
    }
    
    function renderQuests() {
        const c = document.getElementById('questList');
        if (!c) return;
        c.innerHTML = '';
        
        // Заголовок ежедневных
        c.innerHTML += `<div style="margin: 10px 0 5px; color:#8ab4f8;">📅 ЕЖЕДНЕВНЫЕ</div>`;
        dailyQuests.forEach(q => {
            const percent = (q.current / q.target) * 100;
            c.innerHTML += `<div class="quest-item">
                <div style="flex:2">
                    <div>${q.name} <span class="quest-badge daily">день</span></div>
                    <div style="font-size:0.8em;">${q.current}/${q.target}</div>
                    <div class="progress-bar" style="margin-top:5px;"><div class="progress-fill" style="width:${percent}%;background:#ffd700;"></div></div>
                </div>
                <div>🌙 ${q.reward}</div>
                <div class="${q.completed ? 'quest-btn completed' : 'quest-btn'}" ${q.completed ? '' : 'onclick="claimQuest(\''+q.id+'\', true)"'}>${q.completed ? '✅ Выполнен' : '🏆 Забрать'}</div>
            </div>`;
        });
        
        // Заголовок еженедельных
        c.innerHTML += `<div style="margin: 20px 0 5px; color:#ffd966;">📅 ЕЖЕНЕДЕЛЬНЫЕ</div>`;
        weeklyQuests.forEach(q => {
            const percent = (q.current / q.target) * 100;
            c.innerHTML += `<div class="quest-item">
                <div style="flex:2">
                    <div>${q.name} <span class="quest-badge weekly">неделя</span></div>
                    <div style="font-size:0.8em;">${q.current}/${q.target}</div>
                    <div class="progress-bar" style="margin-top:5px;"><div class="progress-fill" style="width:${percent}%;background:#ffd700;"></div></div>
                </div>
                <div>🌙 ${q.reward}</div>
                <div class="${q.completed ? 'quest-btn completed' : 'quest-btn'}" ${q.completed ? '' : 'onclick="claimQuest(\''+q.id+'\', false)"'}>${q.completed ? '✅ Выполнен' : '🏆 Забрать'}</div>
            </div>`;
        });
    }
    
    function claimQuest(id, isDaily) {
        const questsList = isDaily ? dailyQuests : weeklyQuests;
        const q = questsList.find(q => q.id === id);
        if (q && q.current >= q.target && !q.completed) {
            q.completed = true;
            addCoins(q.reward);
            addExp(isDaily ? 15 : 20);
            renderQuests();
            saveQuests();
            showNotif(`✅ +${q.reward} 🌙`);
        } else showNotif('📖 Сначала выполни квест');
    }
    
    // === ЛИДЕРЫ ===
    let leaders = [
        { username: "Читатель", avatar: "🕌", reads: 0, title: "" }
    ];
    
    function loadLeaders() {
        const saved = localStorage.getItem('quran_leaders');
        if (saved) {
            leaders = JSON.parse(saved);
        }
        renderLeaders();
    }
    
    function saveLeaders() {
        localStorage.setItem('quran_leaders', JSON.stringify(leaders));
    }
    
    function updateLeaders() {
        const existing = leaders.find(l => l.username === "Читатель");
        if (existing) {
            existing.reads = fullReads;
            existing.title = getTitle(fullReads);
        } else {
            leaders.push({ username: "Читатель", avatar: "🕌", reads: fullReads, title: getTitle(fullReads) });
        }
        leaders.sort((a, b) => b.reads - a.reads);
        leaders = leaders.slice(0, 50);
        saveLeaders();
        renderLeaders();
    }
    
    function renderLeaders() {
        const container = document.getElementById('leadersList');
        if (!container) return;
        if (leaders.length === 0 || (leaders.length === 1 && leaders[0].reads === 0)) {
            container.innerHTML = '<div class="loading">🏆 Пока нет лидеров. Стань первым, читая Коран!</div>';
            return;
        }
        container.innerHTML = '';
        leaders.forEach((leader, idx) => {
            const rank = idx + 1;
            let medal = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '📌';
            const titleHtml = leader.title ? `<div class="leader-title">${leader.title}</div>` : '';
            container.innerHTML += `
                <div class="leader-card">
                    <div class="leader-rank">${medal} ${rank}</div>
                    <div class="leader-avatar">${leader.avatar}</div>
                    <div class="leader-info">
                        <div class="leader-name">${escapeHtml(leader.username)}</div>
                        <div class="leader-reads">📖 ${leader.reads} прочтений</div>
                        ${titleHtml}
                    </div>
                </div>
            `;
        });
    }
    
    // === ЧТЕНИЕ СУР ===
    const suraNames = {1:"Аль-Фатиха",2:"Аль-Бакара",3:"Аль Имран",4:"Ан-Ниса",5:"Аль-Маида",6:"Аль-Анам",7:"Аль-Араф",8:"Аль-Анфаль",9:"Ат-Тауба",10:"Йунус",11:"Худ",12:"Йусуф",13:"Ар-Рад",14:"Ибрахим",15:"Аль-Хиджр",16:"Ан-Нахль",17:"Аль-Исра",18:"Аль-Кахф",19:"Марьям",20:"Та Ха",21:"Аль-Анбия",22:"Аль-Хаджж",23:"Аль-Муминун",24:"Ан-Нур",25:"Аль-Фуркан",26:"Аш-Шуара",27:"Ан-Намль",28:"Аль-Касас",29:"Аль-Анкабут",30:"Ар-Рум",31:"Лукман",32:"Ас-Саджда",33:"Аль-Ахзаб",34:"Саба",35:"Фатир",36:"Йа Син",37:"Ас-Саффат",38:"Сад",39:"Аз-Зумар",40:"Гафир",41:"Фуссилят",42:"Аш-Шура",43:"Аз-Зухруф",44:"Ад-Духан",45:"Аль-Джасия",46:"Аль-Ахкаф",47:"Мухаммад",48:"Аль-Фатх",49:"Аль-Худжурат",50:"Каф",51:"Аз-Зарият",52:"Ат-Тур",53:"Ан-Наджм",54:"Аль-Камар",55:"Ар-Рахман",56:"Аль-Вакиа",57:"Аль-Хадид",58:"Аль-Муджадиля",59:"Аль-Хашр",60:"Аль-Мумтахана",61:"Ас-Сафф",62:"Аль-Джумуа",63:"Аль-Мунафикун",64:"Ат-Тагабун",65:"Ат-Талак",66:"Ат-Тахрим",67:"Аль-Мульк",68:"Аль-Калам",69:"Аль-Хакка",70:"Аль-Мааридж",71:"Нух",72:"Аль-Джинн",73:"Аль-Муззаммиль",74:"Аль-Муддассир",75:"Аль-Кийама",76:"Аль-Инсан",77:"Аль-Мурсалят",78:"Ан-Наба",79:"Ан-Назиат",80:"Абаса",81:"Ат-Таквир",82:"Аль-Инфитар",83:"Аль-Мутаффифин",84:"Аль-Иншикак",85:"Аль-Бурудж",86:"Ат-Тарик",87:"Аль-Аля",88:"Аль-Гашия",89:"Аль-Фаджр",90:"Аль-Балад",91:"Аш-Шамс",92:"Аль-Лайль",93:"Ад-Духа",94:"Аль-Инширах",95:"Ат-Тин",96:"Аль-Аляк",97:"Аль-Кадр",98:"Аль-Баййина",99:"Аз-Зальзаля",100:"Аль-Адият",101:"Аль-Кариа",102:"Ат-Такасур",103:"Аль-Аср",104:"Аль-Хумаза",105:"Аль-Филь",106:"Курайш",107:"Аль-Маун",108:"Аль-Каусар",109:"Аль-Кафирун",110:"Ан-Наср",111:"Аль-Масад",112:"Аль-Ихлас",113:"Аль-Фаляк",114:"Ан-Нас"};
    
    async function loadSuraList() {
        const c = document.getElementById('suraList');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 1; i <= 114; i++) {
            const card = document.createElement('div');
            card.className = 'sura-card';
            card.onclick = () => loadSura(i);
            card.innerHTML = `<span class="sura-number">${i}.</span> <span>${suraNames[i]}</span>`;
            c.appendChild(card);
        }
    }
    
    function startAyahTimer(ayahDiv, idx) {
        if (activeTimers[idx]) return;
        let timeLeft = 8;
        ayahDiv.classList.add('reading');
        let tb = ayahDiv.querySelector('.timer-bar');
        let tt = ayahDiv.querySelector('.timer-text');
        if (!tb) { tb = document.createElement('div'); tb.className = 'timer-bar'; tt = document.createElement('div'); tt.className = 'timer-text'; ayahDiv.appendChild(tb); ayahDiv.appendChild(tt); }
        const interval = setInterval(() => {
            timeLeft -= 0.1;
            const percent = ((8 - timeLeft) / 8) * 100;
            tb.style.width = `${percent}%`;
            tt.innerText = `${Math.ceil(timeLeft)}с`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                delete activeTimers[idx];
                ayahDiv.classList.remove('reading');
                if (tb) tb.remove();
                if (tt) tt.remove();
                if (!ayahDiv.classList.contains('read')) {
                    ayahDiv.classList.add('read');
                    const key = `quran_sura_${currentSura}_ayahs`;
                    let read = JSON.parse(localStorage.getItem(key)) || [];
                    if (!read.includes(idx)) {
                        read.push(idx);
                        localStorage.setItem(key, JSON.stringify(read));
                        updateQuestProgress('ayat', 1);
                        addExp(2);
                        const total = document.querySelectorAll('.ayah').length;
                        if (read.length === total) {
                            completedSurasCount++;
                            localStorage.setItem('quran_weekly_sura_count', completedSurasCount);
                            updateQuestProgress('sura_complete', 1);
                            updateQuestProgress('sura_complete_count', 1);
                            updateQuestProgress('sura', null, currentSura);
                            addFullRead();
                            updateLeaders();
                        }
                    }
                }
            }
        }, 100);
        activeTimers[idx] = interval;
    }
    
    function stopAyahTimer(idx) {
        if (activeTimers[idx]) {
            clearInterval(activeTimers[idx]);
            delete activeTimers[idx];
            const div = document.querySelector(`.ayah[data-ayah="${idx}"]`);
            if (div) {
                div.classList.remove('reading');
                const tb = div.querySelector('.timer-bar');
                const tt = div.querySelector('.timer-text');
                if (tb) tb.remove();
                if (tt) tt.remove();
            }
        }
    }
    
    function initAyahs() {
        document.querySelectorAll('.ayah').forEach((a, idx) => {
            const i = idx + 1;
            a.setAttribute('data-ayah', i);
            a.onmouseenter = () => startAyahTimer(a, i);
            a.onmouseleave = () => stopAyahTimer(i);
            a.ontouchstart = (e) => { e.preventDefault(); startAyahTimer(a, i); };
            a.ontouchend = () => stopAyahTimer(i);
        });
    }
    
    function loadReadAyahs() {
        const key = `quran_sura_${currentSura}_ayahs`;
        const read = JSON.parse(localStorage.getItem(key)) || [];
        document.querySelectorAll('.ayah').forEach((a, idx) => { if (read.includes(idx + 1)) a.classList.add('read'); });
    }
    
    async function loadSura(num) {
        currentSura = num;
        const cont = document.getElementById('suraContent');
        const textDiv = document.getElementById('suraText');
        const titleSpan = document.getElementById('suraTitle');
        cont.style.display = 'block';
        textDiv.innerHTML = '<div class="loading">🌙 Загрузка...</div>';
        titleSpan.innerHTML = `${num}. ${suraNames[num]}`;
        cont.scrollIntoView({ behavior: 'smooth' });
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/ru.kuliev`);
            const data = await res.json();
            if (data.status === 'OK') {
                let html = '';
                data.data.ayahs.forEach((a, i) => { html += `<div class="ayah"><div class="arabic">${a.text}</div><div class="translation">${i+1}. ${a.translation}</div></div>`; });
                textDiv.innerHTML = html;
                loadReadAyahs();
                initAyahs();
                localStorage.setItem('quran_bookmark_sura', num);
            } else textDiv.innerHTML = '<div class="loading">⚠️ Ошибка</div>';
        } catch(e) { textDiv.innerHTML = '<div class="loading">🔌 Ошибка соединения</div>'; }
    }
    
    function closeSura() { document.getElementById('suraContent').style.display = 'none'; currentSura = null; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        if (tab === 'quests') btns[0].classList.add('active');
        else if (tab === 'leaders') { btns[1].classList.add('active'); loadLeaders(); }
        else if (tab === 'suras') { btns[2].classList.add('active'); loadSuraList(); }
    }
    
    // Запуск
    checkAndResetQuests();
    loadPassData();
    loadLeaders();
    loadSuraList();
    renderQuests();
    
    window.setTheme = setTheme;
    window.switchTab = switchTab;
    window.claimQuest = claimQuest;
    window.loadSura = loadSura;
    window.closeSura = closeSura;
</script>
