<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Электронный Коран — iOS Glass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
            min-height: 100vh;
            color: #ffffff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            padding: 20px;
            font-size: 2.2em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            color: white;
        }
        
        .support-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 100, 50, 0.2));
            backdrop-filter: blur(24px);
            border-radius: 50px;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            border: 0.5px solid rgba(255, 215, 0, 0.5);
            font-weight: 600;
            font-size: 1em;
            color: #ffd966;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .support-btn:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.35), rgba(255, 100, 50, 0.35));
            transform: scale(1.02);
        }
        
        /* Новая табличка-совет */
        .advice-card {
            background: rgba(138, 180, 248, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px 24px;
            margin: 0 0 25px 0;
            border: 0.5px solid rgba(138, 180, 248, 0.4);
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            transition: all 0.3s;
        }
        
        .advice-card:hover {
            background: rgba(138, 180, 248, 0.15);
            border-color: rgba(138, 180, 248, 0.6);
        }
        
        .advice-icon {
            font-size: 2em;
        }
        
        .advice-text {
            font-size: 1em;
            font-weight: 500;
            color: #c8e0ff;
            text-align: center;
            line-height: 1.4;
        }
        
        .advice-text strong {
            color: #ffd966;
        }
        
        .sura-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
            margin-bottom: 30px;
        }
        
        .sura-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border-radius: 22px;
            padding: 16px 10px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            font-weight: 500;
        }
        
        .sura-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
        }
        
        .sura-number {
            color: #8ab4f8;
            font-weight: 600;
            margin-right: 6px;
        }
        
        .sura-content {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(32px);
            border-radius: 44px;
            padding: 28px 24px;
            margin-top: 20px;
            display: none;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }
        
        .sura-header {
            font-size: 1.6em;
            font-weight: 600;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1.5px solid rgba(138, 180, 248, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .close-btn {
            background: rgba(255, 85, 85, 0.2);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 100, 100, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85em;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .close-btn:hover {
            background: rgba(255, 85, 85, 0.5);
        }
        
        .ayah {
            margin-bottom: 24px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 28px;
        }
        
        .ayah:hover {
            background: rgba(255, 255, 255, 0.09);
        }
        
        .arabic {
            font-family: 'Noto Naskh Arabic', 'Amiri', serif;
            font-size: 1.5em;
            font-weight: 500;
            text-align: right;
            line-height: 1.8;
            margin-bottom: 12px;
            color: #eef4ff;
        }
        
        .translation {
            font-size: 0.95em;
            color: #cbd5e6;
            line-height: 1.45;
            padding-left: 14px;
            border-left: 3px solid #8ab4f8;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.1em;
            color: #8ab4f8;
        }
        
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75em;
            color: #6a7c9e;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
        }
        
        @media (max-width: 550px) {
            .sura-list {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .arabic {
                font-size: 1.2em;
            }
            .advice-text {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 Электронный Коран</h1>
        
        <a href="https://www.donationalerts.com/r/skeerstm" target="_blank" class="support-btn">
            🤝 Поддержать нас
        </a>
        
        <!-- Новая табличка-совет -->
        <div class="advice-card">
            <div class="advice-icon">⏳</div>
            <div class="advice-text">
                <strong>30 минут в день с Кораном</strong><br>
                Уделяй чтению всего полчаса — и ты увидишь, как изменится твоя жизнь ✨
            </div>
        </div>
    </div>

    <div id="suraList" class="sura-list">
        <div class="loading">✨ Загрузка сур...</div>
    </div>

    <div id="suraContent" class="sura-content">
        <div class="sura-header">
            <span id="suraTitle"></span>
            <button class="close-btn" onclick="closeSura()">✕ Закрыть</button>
        </div>
        <div id="suraText"></div>
    </div>

    <div class="footer">
        Священный Коран | Перевод Э. Кулиева<br>
        Шрифт: Noto Naskh Arabic | iOS Glass стиль
    </div>
</div>

        112: "Аль-Ихлас (Искренность)",
        113: "Аль-Фаляк (Рассвет)",
        114: "Ан-Нас (Люди)"
    };

    async function loadSuraList() {
        const container = document.getElementById('suraList');
        container.innerHTML = '';
        for (let i = 1; i <= 114; i++) {
            const card = document.createElement('div');
            card.className = 'sura-card';
            card.onclick = () => loadSura(i);
            card.innerHTML = `<span class="sura-number">${i}.</span> <span class="sura-name">${suraNames[i]}</span>`;
            container.appendChild(card);
        }
    }

    async function loadSura(number) {
        const contentDiv = document.getElementById('suraContent');
        const textDiv = document.getElementById('suraText');
        const titleSpan = document.getElementById('suraTitle');

        contentDiv.style.display = 'block';
        textDiv.innerHTML = '<div class="loading">🌙 Загрузка суры...</div>';
        titleSpan.innerHTML = `${number}. ${suraNames[number]}`;
        contentDiv.scrollIntoView({ behavior: 'smooth' });

        try {
            const response = await fetch(`https://api.alquran.cloud/v1/surah/${number}/ru.kuliev`);
            const data = await response.json();
            if (data.status === 'OK') {
                const ayahs = data.data.ayahs;
                let html = '';
                for (let i = 0; i < ayahs.length; i++) {
                    html += `
                        <div class="ayah">
                            <div class="arabic">${ayahs[i].text}</div>
                            <div class="translation">${i+1}. ${ayahs[i].translation}</div>
                        </div>
                    `;
                }
                textDiv.innerHTML = html;
            } else {
                textDiv.innerHTML = '<div class="loading">⚠️ Не удалось загрузить суру.</div>';
            }
        } catch (err) {
            textDiv.innerHTML = '<div class="loading">🔌 Ошибка соединения. Проверьте интернет.</div>';
        }
    }

    function closeSura() {
        document.getElementById('suraContent').style.display = 'none';
    }

    loadSuraList();
</script>
</body>
</html>
