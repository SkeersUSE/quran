<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Коран Battle Pass — Честное чтение</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.3s;
        }
        
        /* Золотая тема */
        body.gold-theme {
            background: radial-gradient(ellipse at 30% 40%, #3d2b1a, #1a0f0a);
        }
        
        body.gold-theme .pass-level {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #3d2b1a;
        }
        
        /* Свечение */
        body.glow-effect .sura-card:hover,
        body.glow-effect .quest-item:hover {
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        /* Корона в уровне */
        .crown-icon {
            font-size: 1.1em;
        }
        
        /* Падающие звёзды */
        .star {
            position: fixed;
            top: -20px;
            font-size: 1.2em;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            padding: 20px;
            font-size: 2em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            color: white;
        }
        
        .pass-panel {
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(138, 180, 248, 0.3);
        }
        
        .pass-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .pass-level {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pass-coins {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.15);
            padding: 6px 16px;
            border-radius: 40px;
        }
        
        .coin-icon {
            font-size: 1.2em;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin: 12px 0;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }
        
        .exp-text {
            font-size: 0.75em;
            text-align: center;
        }
        
        .quests-title {
            font-size: 1.1em;
            margin: 15px 0 10px;
            color: #ffd966;
        }
        
        .quest-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .quest-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.2s;
        }
        
        .quest-info {
            flex: 2;
        }
        
        .quest-name {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .quest-progress {
            font-size: 0.8em;
            color: #8ab4f8;
        }
        
        .quest-reward {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,215,0,0.1);
            padding: 6px 12px;
            border-radius: 30px;
        }
        
        .quest-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8em;
        }
        
        .quest-btn.completed {
            background: rgba(100,200,100,0.3);
            border-color: #64c864;
            cursor: default;
            opacity: 0.7;
        }
        
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        
        .shop-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .shop-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        
        .shop-item-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }
        
        .shop-item-name {
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        
        .shop-item-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #ffd966;
            font-size: 0.8em;
        }
        
        .shop-item.owned {
            opacity: 0.5;
            cursor: default;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: rgba(138, 180, 248, 0.3);
            border-bottom: 2px solid #ffd700;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .support-btn, .bookmark-btn {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.25s;
            border: 0.5px solid rgba(255, 215, 0, 0.4);
            font-size: 0.9em;
            color: #ffd966;
            text-decoration: none;
        }
        
        .sura-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        
        .sura-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border-radius: 22px;
            padding: 14px 8px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.25);
        }
        
        .sura-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
        }
        
        .sura-number {
            color: #8ab4f8;
            font-weight: 600;
            margin-right: 6px;
        }
        
        .sura-content {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(32px);
            border-radius: 44px;
            padding: 28px 24px;
            margin-top: 20px;
            display: none;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }
        
        .sura-header {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1.5px solid rgba(138, 180, 248, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .close-btn {
            background: rgba(255, 85, 85, 0.2);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 100, 100, 0.4);
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
        }
        
        .ayah {
            margin-bottom: 20px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            position: relative;
            transition: all 0.2s;
        }
        
        .ayah.read {
            background: rgba(138, 180, 248, 0.15);
            border-left: 3px solid #ffd700;
        }
        
        .ayah.reading {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 0 0 0 24px;
            transition: width 0.1s linear;
        }
        
        .timer-text {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.7em;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffd700;
        }
        
        .arabic {
            font-family: 'Noto Naskh Arabic', 'Amiri', serif;
            font-size: 1.3em;
            text-align: right;
            line-height: 1.7;
            margin-bottom: 8px;
            color: #eef4ff;
        }
        
        .translation {
            font-size: 0.9em;
            color: #cbd5e6;
            padding-left: 12px;
            border-left: 3px solid #8ab4f8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8ab4f8;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7em;
            color: #6a7c9e;
            margin-top: 20px;
        }
        
        @media (max-width: 550px) {
            .sura-list {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .arabic {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 Электронный Коран</h1>
        <a href="https://www.donationalerts.com/r/skeerstm" target="_blank" class="support-btn">🤝 Поддержать нас</a>
        <div class="bookmark-btn" onclick="goToBookmark()">🔖 Продолжить с закладки</div>
    </div>

    <!-- Панель Pass -->
    <div class="pass-panel">
        <div class="pass-header">
            <div class="pass-level" id="passLevel">Уровень 1</div>
            <div class="pass-coins">
                <span class="coin-icon">🌙</span>
                <span id="coinCount">0</span>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="passProgress"></div>
        </div>
        <div class="exp-text" id="expDisplay">Опыт: 0 / 100</div>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quests')">📋 Квесты</button>
        <button class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
        <button class="tab-btn" onclick="switchTab('suras')">📖 Суры</button>
    </div>

    <div id="questsTab" class="tab-content active">
        <div class="quests-title">🌟 Ежедневные квесты</div>
        <div class="quest-list" id="questList"></div>
    </div>

    <div id="shopTab" class="tab-content">
        <div class="quests-title">🛍️ Магазин наград 🌙</div>
        <div class="shop-grid" id="shopGrid"></div>
    </div>

    <div id="surasTab" class="tab-content">
        <div id="suraList" class="sura-list"><div class="loading">✨ Загрузка...</div></div>
    </div>

    <div id="suraContent" class="sura-content">
        <div class="sura-header">
            <span id="suraTitle"></span>
            <button class="close-btn" onclick="closeSura()">✕ Закрыть</button>
        </div>
        <div id="suraText"></div>
    </div>

    <div class="footer">Коран | Перевод Э. Кулиева | Честное чтение (8 секунд на аят)</div>
</div>

<script>
    // === Pass система ===
    let passData = { level: 1, exp: 0, coins: 0, ownedItems: [] };
    const EXP_PER_LEVEL = 100;
    const MAX_LEVEL = 20;
    
    // Награды за уровни
    const levelRewards = { 5: 50, 10: 100, 15: 150, 20: 200 };
    
    // Магазин
    const shopItems = [
        { id: 'theme_gold', name: 'Золотая тема', icon: '✨', price: 100, type: 'theme', apply: () => document.body.classList.add('gold-theme') },
        { id: 'icon_crown', name: 'Корона', icon: '👑', price: 50, type: 'icon', apply: () => {
            document.querySelector('.pass-level').innerHTML = '👑 Уровень ' + passData.level;
        } },
        { id: 'effect_stars', name: 'Звёздный эффект', icon: '⭐', price: 75, type: 'effect', apply: () => startStars() },
        { id: 'border_glow', name: 'Свечение', icon: '🌟', price: 120, type: 'border', apply: () => document.body.classList.add('glow-effect') }
    ];
    
    let starInterval = null;
    function startStars() {
        if (starInterval) return;
        starInterval = setInterval(() => {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = ['⭐', '✨', '🌟', '💫'][Math.floor(Math.random() * 4)];
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDuration = 2 + Math.random() * 3 + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }, 3000);
    }
    
    function loadPassData() {
        const saved = localStorage.getItem('quran_pass');
        if (saved) passData = JSON.parse(saved);
        // Применяем купленные эффекты
        if (passData.ownedItems.includes('theme_gold')) document.body.classList.add('gold-theme');
        if (passData.ownedItems.includes('border_glow')) document.body.classList.add('glow-effect');
        if (passData.ownedItems.includes('icon_crown')) document.querySelector('.pass-level').innerHTML = '👑 Уровень ' + passData.level;
        if (passData.ownedItems.includes('effect_stars')) startStars();
        updatePassUI();
    }
    
    function savePassData() { localStorage.setItem('quran_pass', JSON.stringify(passData)); }
    
    function addExp(amount) {
        passData.exp += amount;
        let leveledUp = false;
        while (passData.exp >= EXP_PER_LEVEL && passData.level < MAX_LEVEL) {
            passData.exp -= EXP_PER_LEVEL;
            passData.level++;
            leveledUp = true;
            if (levelRewards[passData.level]) {
                passData.coins += levelRewards[passData.level];
                showNotif(`🎉 Уровень ${passData.level}! +${levelRewards[passData.level]} 🌙`);
            } else showNotif(`🎉 Поздравляю! Уровень ${passData.level}!`);
        }
        if (passData.level >= MAX_LEVEL) passData.exp = 0;
        updatePassUI();
        savePassData();
        if (leveledUp) renderShop();
    }
    
    function addCoins(amount) {
        passData.coins += amount;
        updatePassUI();
        savePassData();
        renderShop();
        showNotif(`+${amount} 🌙 монет!`, 1500);
    }
    
    function updatePassUI() {
        document.getElementById('passLevel').innerHTML = (passData.ownedItems.includes('icon_crown') ? '👑 ' : '') + 'Уровень ' + passData.level;
        document.getElementById('coinCount').innerText = passData.coins;
        const percent = (passData.exp / EXP_PER_LEVEL) * 100;
        document.getElementById('passProgress').style.width = `${percent}%`;
        document.getElementById('expDisplay').innerText = `Опыт: ${passData.exp} / ${EXP_PER_LEVEL}`;
    }
    
    function showNotif(msg, duration = 2000) {
        const n = document.createElement('div');
        n.innerText = msg;
        n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a2e;padding:10px 20px;border-radius:40px;z-index:1000;animation:fadeOut 2s forwards;';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), duration);
    }
    
    // === Квесты ===
    let quests = [
        { id: 'read10', name: '📖 Прочитай 10 аятов', target: 10, current: 0, reward: 20, completed: false, type: 'ayat' },
        { id: 'read50', name: '📚 Прочитай 50 аятов', target: 50, current: 0, reward: 50, completed: false, type: 'ayat' },
        { id: 'sura1', name: '🌟 Прочитай суру Аль-Фатиха', target: 1, current: 0, reward: 30, completed: false, type: 'sura', suraId: 1 },
        { id: 'sura112', name: '🤲 Прочитай суру Аль-Ихлас', target: 1, current: 0, reward: 25, completed: false, type: 'sura', suraId: 112 }
    ];
    
    function loadQuests() {
        const saved = localStorage.getItem('quran_quests');
        if (saved) {
            const sq = JSON.parse(saved);
            quests.forEach(q => { const f = sq.find(s => s.id === q.id); if (f) { q.current = f.current; q.completed = f.completed; } });
        }
        renderQuests();
    }
    function saveQuests() { localStorage.setItem('quran_quests', JSON.stringify(quests.map(q => ({ id: q.id, current: q.current, completed: q.completed })))); }
    
    function updateQuestProgress(type, value) {
        let updated = false;
        quests.forEach(q => {
            if (q.completed) return;
            if (type === 'ayat' && q.type === 'ayat') {
                q.current = Math.min(q.current + value, q.target);
                if (q.current >= q.target && !q.completed) { q.completed = true; addCoins(q.reward); addExp(15); showNotif(`✅ Квест выполнен! +${q.reward} 🌙`); }
                updated = true;
            } else if (type === 'sura' && q.type === 'sura' && q.suraId === value && !q.completed) {
                q.current = 1; q.completed = true; addCoins(q.reward); addExp(20); showNotif(`✅ Квест выполнен! +${q.reward} 🌙`);
                updated = true;
            }
        });
        if (updated) { renderQuests(); saveQuests(); }
    }
    
    function renderQuests() {
        const c = document.getElementById('questList');
        if (!c) return;
        c.innerHTML = '';
        quests.forEach(q => {
            const percent = (q.current / q.target) * 100;
            c.innerHTML += `<div class="quest-item"><div class="quest-info"><div class="quest-name">${q.name}</div><div class="quest-progress">${q.current}/${q.target}</div><div class="progress-bar" style="margin-top:5px;"><div class="progress-fill" style="width:${percent}%;background:#ffd700;"></div></div></div><div class="quest-reward">🌙 ${q.reward}</div><div class="quest-btn ${q.completed ? 'completed' : ''}" ${q.completed ? '' : `onclick="claimQuest('${q.id}')"`}>${q.completed ? '✅ Выполнен' : '🏆 Забрать'}</div></div>`;
        });
    }
    
    function claimQuest(id) {
        const q = quests.find(q => q.id === id);
        if (q && q.current >= q.target && !q.completed) { q.completed = true; addCoins(q.reward); addExp(15); renderQuests(); saveQuests(); showNotif(`✅ +${q.reward} 🌙`); }
        else showNotif(`📖 Сначала выполни квест!`);
    }
    
    function renderShop() {
        const c = document.getElementById('shopGrid');
        if (!c) return;
        c.innerHTML = '';
        shopItems.forEach(item => {
            const owned = passData.ownedItems.includes(item.id);
            c.innerHTML += `<div class="shop-item ${owned ? 'owned' : ''}" onclick="buyItem('${item.id}')"><div class="shop-item-icon">${item.icon}</div><div class="shop-item-name">${item.name}</div><div class="shop-item-price">🌙 ${item.price}</div>${owned ? '<div style="font-size:0.7em;">✅ Куплено</div>' : ''}</div>`;
        });
    }
    
    function buyItem(id) {
        const item = shopItems.find(i => i.id === id);
        if (!item) return;
        if (passData.ownedItems.includes(id)) { showNotif('Уже куплено!'); return; }
        if (passData.coins >= item.price) {
            passData.coins -= item.price;
            passData.ownedItems.push(id);
            savePassData();
            item.apply();
            renderShop();
            updatePassUI();
            showNotif(`🎉 Куплено: ${item.name}!`);
        } else showNotif(`❌ Не хватает 🌙! Нужно ${item.price}`);
    }
    
    // === Честное чтение ===
    let currentSuraNumber = null;
    let activeTimers = {};
    
    function startAyahTimer(ayahDiv, ayahIndex) {
        if (activeTimers[ayahIndex]) return;
        let timeLeft = 8;
        ayahDiv.classList.add('reading');
        let timerBar = ayahDiv.querySelector('.timer-bar');
        let timerText = ayahDiv.querySelector('.timer-text');
        if (!timerBar) {
            timerBar = document.createElement('div');
            timerBar.className = 'timer-bar';
            timerText = document.createElement('div');
            timerText.className = 'timer-text';
            ayahDiv.appendChild(timerBar);
            ayahDiv.appendChild(timerText);
        }
        timerBar.style.width = '0%';
        const interval = setInterval(() => {
            timeLeft -= 0.1;
            const percent = ((8 - timeLeft) / 8) * 100;
            timerBar.style.width = `${percent}%`;
            timerText.innerText = `${Math.ceil(timeLeft)}с`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                delete activeTimers[ayahIndex];
                ayahDiv.classList.remove('reading');
                timerText.remove();
                timerBar.remove();
                if (!ayahDiv.classList.contains('read')) {
                    ayahDiv.classList.add('read');
                    const key = `quran_sura_${currentSuraNumber}_ayahs`;
                    let read = JSON.parse(localStorage.getItem(key)) || [];
                    if (!read.includes(ayahIndex)) {
                        read.push(ayahIndex);
                        localStorage.setItem(key, JSON.stringify(read));
                        updateQuestProgress('ayat', 1);
                        addExp(2);
                        showNotif(`📖 Аят ${ayahIndex} прочитан! +2 опыта`, 1000);
                        const total = document.querySelectorAll('.ayah').length;
                        if (read.length === total) updateQuestProgress('sura', currentSuraNumber);
                    }
                }
            }
        }, 100);
        activeTimers[ayahIndex] = interval;
    }
    
    function stopAyahTimer(ayahIndex) {
        if (activeTimers[ayahIndex]) {
            clearInterval(activeTimers[ayahIndex]);
            delete activeTimers[ayahIndex];
            const ayahDiv = document.querySelector(`.ayah[data-ayah="${ayahIndex}"]`);
            if (ayahDiv) {
                ayahDiv.classList.remove('reading');
                const tb = ayahDiv.querySelector('.timer-bar');
                const tt = ayahDiv.querySelector('.timer-text');
                if (tb) tb.remove();
                if (tt) tt.remove();
            }
        }
    }
    
    function initAyahObservers() {
        const ayahs = document.querySelectorAll('.ayah');
        ayahs.forEach((ayah, idx) => {
            const ayahIndex = idx + 1;
            ayah.setAttribute('data-ayah', ayahIndex);
            ayah.addEventListener('mouseenter', () => startAyahTimer(ayah, ayahIndex));
            ayah.addEventListener('mouseleave', () => stopAyahTimer(ayahIndex));
        });
    }
    
    function loadReadAyahs() {
        const key = `quran_sura_${currentSuraNumber}_ayahs`;
        const read = JSON.parse(localStorage.getItem(key)) || [];
        document.querySelectorAll('.ayah').forEach((ayah, idx) => {
            if (read.includes(idx + 1)) ayah.classList.add('read');
        });
    }
    
    function saveBookmark() { if (currentSuraNumber) localStorage.setItem('quran_bookmark_sura', currentSuraNumber); showNotif('🔖 Закладка сохранена', 1000); }
    function goToBookmark() { const s = localStorage.getItem('quran_bookmark_sura'); if (s) loadSura(parseInt(s)); else showNotif('Нет закладки'); }
    
    // === Суры ===
    const suraNames = {1:"Аль-Фатиха",2:"Аль-Бакара",3:"Аль Имран",4:"Ан-Ниса",5:"Аль-Маида",6:"Аль-Анам",7:"Аль-Араф",8:"Аль-Анфаль",9:"Ат-Тауба",10:"Йунус",11:"Худ",12:"Йусуф",13:"Ар-Рад",14:"Ибрахим",15:"Аль-Хиджр",16:"Ан-Нахль",17:"Аль-Исра",18:"Аль-Кахф",19:"Марьям",20:"Та Ха",21:"Аль-Анбия",22:"Аль-Хаджж",23:"Аль-Муминун",24:"Ан-Нур",25:"Аль-Фуркан",26:"Аш-Шуара",27:"Ан-Намль",28:"Аль-Касас",29:"Аль-Анкабут",30:"Ар-Рум",31:"Лукман",32:"Ас-Саджда",33:"Аль-Ахзаб",34:"Саба",35:"Фатир",36:"Йа Син",37:"Ас-Саффат",38:"Сад",39:"Аз-Зумар",40:"Гафир",41:"Фуссилят",42:"Аш-Шура",43:"Аз-Зухруф",44:"Ад-Духан",45:"Аль-Джасия",46:"Аль-Ахкаф",47:"Мухаммад",48:"Аль-Фатх",49:"Аль-Худжурат",50:"Каф",51:"Аз-Зарият",52:"Ат-Тур",53:"Ан-Наджм",54:"Аль-Камар",55:"Ар-Рахман",56:"Аль-Вакиа",57:"Аль-Хадид",58:"Аль-Муджадиля",59:"Аль-Хашр",60:"Аль-Мумтахана",61:"Ас-Сафф",62:"Аль-Джумуа",63:"Аль-Мунафикун",64:"Ат-Тагабун",65:"Ат-Талак",66:"Ат-Тахрим",67:"Аль-Мульк",68:"Аль-Калам",69:"Аль-Хакка",70:"Аль-Мааридж",71:"Нух",72:"Аль-Джинн",73:"Аль-Муззаммиль",74:"Аль-Муддассир",75:"Аль-Кийама",76:"Аль-Инсан",77:"Аль-Мурсалят",78:"Ан-Наба",79:"Ан-Назиат",80:"Абаса",81:"Ат-Таквир",82:"Аль-Инфитар",83:"Аль-Мутаффифин",84:"Аль-Иншикак",85:"Аль-Бурудж",86:"Ат-Тарик",87:"Аль-Аля",88:"Аль-Гашия",89:"Аль-Фаджр",90:"Аль-Балад",91:"Аш-Шамс",92:"Аль-Лайль",93:"Ад-Духа",94:"Аль-Инширах",95:"Ат-Тин",96:"Аль-Аляк",97:"Аль-Кадр",98:"Аль-Баййина",99:"Аз-Зальзаля",100:"Аль-Адият",101:"Аль-Кариа",102:"Ат-Такасур",103:"Аль-Аср",104:"Аль-Хумаза",105:"Аль-Филь",106:"Курайш",107:"Аль-Маун",108:"Аль-Каусар",109:"Аль-Кафирун",110:"Ан-Наср",111:"Аль-Масад",112:"Аль-Ихлас",113:"Аль-Фаляк",114:"Ан-Нас"};
    
    async function loadSuraList() {
        const c = document.getElementById('suraList');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 1; i <= 114; i++) {
            const card = document.createElement('div');
            card.className = 'sura-card';
            card.onclick = () => loadSura(i);
            card.innerHTML = `<span class="sura-number">${i}.</span> <span class="sura-name">${suraNames[i]}</span>`;
            c.appendChild(card);
        }
    }
    
    async function loadSura(number) {
        currentSuraNumber = number;
        const contentDiv = document.getElementById('suraContent');
        const textDiv = document.getElementById('suraText');
        const titleSpan = document.getElementById('suraTitle');
        contentDiv.style.display = 'block';
        textDiv.innerHTML = '<div class="loading">🌙 Загрузка...</div>';
        titleSpan.innerHTML = `${number}. ${suraNames[number]}`;
        contentDiv.scrollIntoView({ behavior: 'smooth' });
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${number}/ru.kuliev`);
            const data = await res.json();
            if (data.status === 'OK') {
                let html = '';
                data.data.ayahs.forEach((ayah, i) => {
                    html += `<div class="ayah" data-ayah="${i+1}"><div class="arabic">${ayah.text}</div><div class="translation">${i+1}. ${ayah.translation}</div></div>`;
                });
                textDiv.innerHTML = html;
                loadReadAyahs();
                initAyahObservers();
                saveBookmark();
            } else textDiv.innerHTML = '<div class="loading">⚠️ Ошибка</div>';
        } catch(e) { textDiv.innerHTML = '<div class="loading">🔌 Ошибка соединения</div>'; }
    }
    
    function closeSura() { document.getElementById('suraContent').style.display = 'none'; currentSuraNumber = null; }
    function switchTab(tab) {
        ['quests','shop','suras'].forEach(t => document.getElementById(t+'Tab').classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab+'Tab').classList.add('active');
        if (tab === 'quests') document.querySelector('.tab-btn').classList.add('active');
        else if (tab === 'shop') { document.querySelectorAll('.tab-btn')[1].classList.add('active'); renderShop(); }
        else if (tab === 'suras') { document.querySelectorAll('.tab-btn')[2].classList.add('active'); loadSuraList(); }
    }
    
    loadPassData();
    loadQuests();
    loadSuraList();
    window.switchTab = switchTab;
    window.claimQuest = claimQuest;
    window.buyItem = buyItem;
    window.goToBookmark = goToBookmark;
    window.closeSura = closeSura;
    window.loadSura = loadSura;
</script>
