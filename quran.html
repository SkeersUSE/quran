<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Коран Battle Pass — Общий чат</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.3s, color 0.3s;
        }
        
        body.dark-theme {
            background: radial-gradient(ellipse at 30% 40%, #0a1628, #030712);
        }
        
        body.gold-theme {
            background: radial-gradient(ellipse at 30% 40%, #3d2b1a, #1a0f0a);
        }
        
        body.light-theme {
            background: #f5f5f0;
            color: #1a1a2e;
        }
        
        body.light-theme .sura-card,
        body.light-theme .quest-item,
        body.light-theme .shop-item,
        body.light-theme .pass-panel,
        body.light-theme .sura-content,
        body.light-theme .chat-container {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            color: #1a1a2e;
        }
        
        body.light-theme .chat-input {
            color: #1a1a2e;
            background: rgba(0,0,0,0.1);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            padding: 20px;
            font-size: 1.8em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }
        
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        .username {
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .theme-buttons {
            display: flex;
            gap: 8px;
        }
        
        .theme-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-size: 0.8em;
        }
        
        body.light-theme .theme-btn {
            color: #1a1a2e;
            background: rgba(0,0,0,0.1);
        }
        
        .pass-panel {
            background: rgba(138, 180, 248, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .pass-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .pass-level {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a1a2e;
        }
        
        .pass-coins {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.15);
            padding: 6px 16px;
            border-radius: 40px;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
        }
        
        body.light-theme .tab-btn {
            color: #1a1a2e;
            background: rgba(0,0,0,0.05);
        }
        
        .tab-btn.active {
            background: rgba(138, 180, 248, 0.4);
            border-bottom: 2px solid #ffd700;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .chat-container {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            height: 450px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-message {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 15px;
            max-width: 80%;
            align-self: flex-start;
        }
        
        .chat-message.own {
            align-self: flex-end;
            background: rgba(255,215,0,0.2);
        }
        
        .chat-name {
            font-size: 0.7em;
            color: #ffd966;
            margin-bottom: 4px;
        }
        
        .chat-text {
            font-size: 0.9em;
            word-break: break-word;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-size: 0.9em;
        }
        
        .chat-send {
            background: #ffd700;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #1a1a2e;
        }
        
        .sura-list, .quest-list, .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        
        .sura-card, .quest-item, .shop-item {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .sura-card:hover, .quest-item:hover, .shop-item:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
        }
        
        .sura-number { color: #ffd966; font-weight: bold; }
        
        .sura-content {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(32px);
            border-radius: 44px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .sura-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .close-btn {
            background: rgba(255,85,85,0.3);
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .ayah {
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        
        .ayah.read {
            background: rgba(138,180,248,0.15);
            border-left: 3px solid #ffd700;
        }
        
        .ayah.reading {
            background: rgba(255,215,0,0.1);
        }
        
        .timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #ffd700;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .timer-text {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.7em;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .arabic {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 1.3em;
            text-align: right;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        
        .translation {
            font-size: 0.85em;
            color: #ccc;
            padding-left: 12px;
            border-left: 2px solid #ffd700;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 20px;
        }
        
        .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .register-card {
            background: rgba(20,30,50,0.95);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            padding: 30px;
            text-align: center;
            width: 300px;
        }
        
        .register-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            text-align: center;
        }
        
        .register-card button {
            background: #ffd700;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .avatar-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .avatar-option {
            font-size: 2em;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }
        
        .avatar-option.selected {
            background: rgba(255,215,0,0.3);
            transform: scale(1.1);
        }
        
        @media (max-width: 550px) {
            .sura-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .arabic { font-size: 1.1em; }
            .profile-panel { flex-direction: column; text-align: center; }
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        .star {
            position: fixed;
            top: -20px;
            font-size: 1.2em;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 Электронный Коран</h1>
    </div>

    <div class="profile-panel" id="profilePanel">
        <div class="profile-info">
            <div class="avatar" id="avatar" onclick="openRegister()">🕌</div>
            <div class="username" id="usernameDisplay">Гость</div>
        </div>
        <div class="theme-buttons">
            <button class="theme-btn" onclick="setTheme('dark')">🌙 Тёмная</button>
            <button class="theme-btn" onclick="setTheme('gold')">✨ Золотая</button>
            <button class="theme-btn" onclick="setTheme('light')">☀️ Светлая</button>
        </div>
    </div>

    <div class="pass-panel">
        <div class="pass-header">
            <div class="pass-level" id="passLevel">Уровень 1</div>
            <div class="pass-coins"><span>🌙</span> <span id="coinCount">0</span></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="passProgress"></div></div>
        <div style="font-size:0.7em; margin-top:5px;" id="expDisplay">Опыт: 0 / 100</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quests')">📋 Квесты</button>
        <button class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
        <button class="tab-btn" onclick="switchTab('chat')">💬 Чат</button>
        <button class="tab-btn" onclick="switchTab('suras')">📖 Суры</button>
    </div>

    <div id="questsTab" class="tab-content active"><div class="quests-title">🌟 Ежедневные квесты</div><div id="questList" class="quest-list"></div></div>
    <div id="shopTab" class="tab-content"><div class="quests-title">🛍️ Магазин наград</div><div id="shopGrid" class="shop-grid"></div></div>
    
    <div id="chatTab" class="tab-content">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"><div class="loading">💬 Загрузка чата...</div></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Напиши сообщение..." maxlength="200">
                <button class="chat-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <div id="surasTab" class="tab-content"><div id="suraList" class="sura-list"><div class="loading">✨ Загрузка...</div></div></div>

    <div id="suraContent" class="sura-content">
        <div class="sura-header"><span id="suraTitle"></span><button class="close-btn" onclick="closeSura()">✕ Закрыть</button></div>
        <div id="suraText"></div>
    </div>

    <div class="footer">Коран | Перевод Кулиева | Общий чат для всех 🌍</div>
</div>

<div id="registerOverlay" class="register-overlay" style="display:none;">
    <div class="register-card">
        <h3>📝 Создай профиль</h3>
        <input type="text" id="regName" placeholder="Твой никнейм" maxlength="20">
        <div class="avatar-options" id="avatarOptions"></div>
        <button onclick="registerUser()">✅ Начать</button>
        <button onclick="closeRegister()" style="background:#555; margin-top:5px;">❌ Закрыть</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ЧАТА ==========
    // ⚠️ ЗАМЕНИ НА СВОИ ССЫЛКИ! ⚠️
    const CHAT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9eyGXKyHDXQtUkFiGfyP8PH4OEGxTXSwlhUWzCZI3Bxr8oYm_lLKKMmkv64q6t25oE29irFTg-qj5/pubhtml";  // Ссылка из Шага 2
    const CHAT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzI_7HbTAiQa779fsUIDho_w7-218-PboKtqvvByxvhL0Xgbo-yPqLGA2YM9abkbUWcqw/exec";               // Ссылка из Шага 3
    // ====================================
    
    // === ТЕМЫ ===
    function setTheme(theme) {
        document.body.classList.remove('dark-theme', 'gold-theme', 'light-theme');
        if (theme === 'dark') document.body.classList.add('dark-theme');
        else if (theme === 'gold') document.body.classList.add('gold-theme');
        else if (theme === 'light') document.body.classList.add('light-theme');
        localStorage.setItem('quran_theme', theme);
    }
    const savedTheme = localStorage.getItem('quran_theme') || 'dark';
    setTheme(savedTheme);
    
    // === ПРОФИЛЬ ===
    let userProfile = { name: 'Гость', avatar: '🕌', userId: null };
    const avatars = ['🕌', '🌟', '🕋', '🌙', '📖', '🤲', '⭐', '💚', '🕊️', '👑'];
    
    function loadProfile() {
        const saved = localStorage.getItem('quran_profile');
        if (saved) {
            userProfile = JSON.parse(saved);
            document.getElementById('usernameDisplay').innerText = userProfile.name;
            document.getElementById('avatar').innerText = userProfile.avatar;
        }
        if (!userProfile.userId) userProfile.userId = 'user_' + Math.random().toString(36).substr(2, 9);
    }
    
    function openRegister() {
        const overlay = document.getElementById('registerOverlay');
        const optionsDiv = document.getElementById('avatarOptions');
        optionsDiv.innerHTML = '';
        avatars.forEach(ava => {
            const div = document.createElement('div');
            div.className = 'avatar-option';
            div.innerText = ava;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('regName').dataset.selectedAvatar = ava;
            };
            optionsDiv.appendChild(div);
        });
        document.getElementById('regName').value = userProfile.name !== 'Гость' ? userProfile.name : '';
        overlay.style.display = 'flex';
    }
    
    function closeRegister() { document.getElementById('registerOverlay').style.display = 'none'; }
    
    function registerUser() {
        let name = document.getElementById('regName').value.trim();
        if (!name) name = 'Путник';
        if (name.length > 20) name = name.slice(0,20);
        let avatar = document.querySelector('.avatar-option.selected')?.innerText || avatars[0];
        userProfile = { name: name, avatar: avatar, userId: userProfile.userId };
        localStorage.setItem('quran_profile', JSON.stringify(userProfile));
        document.getElementById('usernameDisplay').innerText = name;
        document.getElementById('avatar').innerText = avatar;
        closeRegister();
        renderShop();
    }
    
    // === PASS система ===
    let passData = { level: 1, exp: 0, coins: 0, ownedItems: [] };
    const EXP_PER_LEVEL = 100;
    const MAX_LEVEL = 20;
    const levelRewards = { 5: 50, 10: 100, 15: 150, 20: 200 };
    
    const shopItems = [
        { id: 'theme_gold', name: 'Золотая тема', icon: '✨', price: 100, type: 'theme', apply: () => setTheme('gold') },
        { id: 'icon_crown', name: 'Корона', icon: '👑', price: 50, type: 'icon', apply: () => {} },
        { id: 'effect_stars', name: 'Звёзды', icon: '⭐', price: 75, type: 'effect', apply: () => startStars() },
        { id: 'border_glow', name: 'Свечение', icon: '🌟', price: 120, type: 'border', apply: () => document.body.classList.add('glow-effect') }
    ];
    
    let starInterval = null;
    function startStars() {
        if (starInterval) return;
        starInterval = setInterval(() => {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = ['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
            star.style.left = Math.random() * 100 + '%';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }, 3000);
    }
    
    function loadPassData() {
        const saved = localStorage.getItem('quran_pass');
        if (saved) passData = JSON.parse(saved);
        if (passData.ownedItems.includes('effect_stars')) startStars();
        updatePassUI();
    }
    function savePassData() { localStorage.setItem('quran_pass', JSON.stringify(passData)); }
    
    function addExp(amount) {
        passData.exp += amount;
        while (passData.exp >= EXP_PER_LEVEL && passData.level < MAX_LEVEL) {
            passData.exp -= EXP_PER_LEVEL;
            passData.level++;
            if (levelRewards[passData.level]) {
                passData.coins += levelRewards[passData.level];
                showNotif(`🎉 Уровень ${passData.level}! +${levelRewards[passData.level]} 🌙`);
            } else showNotif(`🎉 Уровень ${passData.level}!`);
        }
        if (passData.level >= MAX_LEVEL) passData.exp = 0;
        updatePassUI();
        savePassData();
        renderShop();
    }
    
    function addCoins(amount) { passData.coins += amount; updatePassUI(); savePassData(); renderShop(); showNotif(`+${amount} 🌙`, 1000); }
    function updatePassUI() {
        document.getElementById('passLevel').innerHTML = (passData.ownedItems.includes('icon_crown') ? '👑 ' : '') + 'Уровень ' + passData.level;
        document.getElementById('coinCount').innerText = passData.coins;
        document.getElementById('passProgress').style.width = `${(passData.exp/EXP_PER_LEVEL)*100}%`;
        document.getElementById('expDisplay').innerText = `Опыт: ${passData.exp} / ${EXP_PER_LEVEL}`;
    }
    function showNotif(msg, dur=2000) {
        const n = document.createElement('div');
        n.innerText = msg;
        n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a2e;padding:10px 20px;border-radius:40px;z-index:1001;animation:fadeOut 2s forwards;';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), dur);
    }
    
    // === КВЕСТЫ ===
    let quests = [
        { id: 'read10', name: '📖 10 аятов', target: 10, current: 0, reward: 20, completed: false, type: 'ayat' },
        { id: 'read50', name: '📚 50 аятов', target: 50, current: 0, reward: 50, completed: false, type: 'ayat' },
        { id: 'sura1', name: '🌟 Аль-Фатиха', target: 1, current: 0, reward: 30, completed: false, type: 'sura', suraId: 1 },
        { id: 'sura112', name: '🤲 Аль-Ихлас', target: 1, current: 0, reward: 25, completed: false, type: 'sura', suraId: 112 }
    ];
    function loadQuests() { const s = localStorage.getItem('quran_quests'); if(s) { const sq=JSON.parse(s); quests.forEach(q=>{const f=sq.find(sq=>sq.id===q.id); if(f){q.current=f.current; q.completed=f.completed;}}); } renderQuests(); }
    function saveQuests() { localStorage.setItem('quran_quests', JSON.stringify(quests.map(q=>({id:q.id,current:q.current,completed:q.completed})))); }
    function updateQuestProgress(type, val) {
        quests.forEach(q=>{
            if(q.completed) return;
            if(type==='ayat' && q.type==='ayat'){ q.current=Math.min(q.current+val, q.target); if(q.current>=q.target && !q.completed){ q.completed=true; addCoins(q.reward); addExp(15); showNotif(`✅ Квест: +${q.reward} 🌙`); } }
            if(type==='sura' && q.type==='sura' && q.suraId===val && !q.completed){ q.completed=true; addCoins(q.reward); addExp(20); showNotif(`✅ Квест: +${q.reward} 🌙`); }
        });
        renderQuests(); saveQuests();
    }
    function renderQuests() {
        const c = document.getElementById('questList');
        if(!c) return;
        c.innerHTML = '';
        quests.forEach(q=>{
            const percent = (q.current/q.target)*100;
            c.innerHTML += `<div class="quest-item"><div><div>${q.name}</div><div>${q.current}/${q.target}</div><div class="progress-bar" style="margin-top:5px;"><div class="progress-fill" style="width:${percent}%;background:#ffd700;"></div></div></div><div>🌙 ${q.reward}</div><div class="quest-btn ${q.completed?'completed':''}" ${q.completed?'':'onclick="claimQuest(\''+q.id+'\')"'}>${q.completed?'✅ Выполнен':'🏆 Забрать'}</div></div>`;
        });
    }
    function claimQuest(id) { const q=quests.find(q=>q.id===id); if(q && q.current>=q.target && !q.completed){ q.completed=true; addCoins(q.reward); addExp(15); renderQuests(); saveQuests(); showNotif(`✅ +${q.reward} 🌙`); } else showNotif('📖 Выполни квест'); }
    
    // === МАГАЗИН ===
    function renderShop() {
        const c = document.getElementById('shopGrid');
        if(!c) return;
        c.innerHTML = '';
        shopItems.forEach(item=>{
            const owned = passData.ownedItems.includes(item.id);
            c.innerHTML += `<div class="shop-item ${owned?'owned':''}" onclick="buyItem('${item.id}')"><div>${item.icon}</div><div>${item.name}</div><div>🌙 ${item.price}</div>${owned?'<div style="font-size:0.7em;">✅</div>':''}</div>`;
        });
    }
    function buyItem(id) {
        const item = shopItems.find(i=>i.id===id);
        if(!item) return;
        if(passData.ownedItems.includes(id)){ showNotif('Уже куплено'); return; }
        if(passData.coins >= item.price){
            passData.coins -= item.price;
            passData.ownedItems.push(id);
            savePassData();
            if(item.apply) item.apply();
            renderShop();
            updatePassUI();
            showNotif(`🎉 Куплено: ${item.name}`);
        } else showNotif(`❌ Нужно ${item.price} 🌙`);
    }
    
    // === ОБЩИЙ ЧАТ ===
    let badWords = ['мат1', 'мат2', 'хер', 'дурак', 'идиот', 'тупой', 'редиска', 'заткнись', 'пошел', 'урод', 'тупая', 'идиотина'];
    function filterMessage(text) {
        let filtered = text;
        badWords.forEach(word => {
            const regex = new RegExp(word, 'gi');
            filtered = filtered.replace(regex, '***');
        });
        return filtered;
    }
    
    async function loadMessages() {
        try {
            const response = await fetch(CHAT_CSV_URL + '?t=' + Date.now());
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            const messages = [];
            for (let i = rows.length - 1; i >= 0; i--) {
                const row = rows[i];
                if (!row.trim()) continue;
                const parts = row.split(',');
                if (parts.length >= 4) {
                    messages.push({
                        time: parts[0],
                        name: parts[1]?.replace(/^"|"$/g, '') || 'Аноним',
                        avatar: parts[2]?.replace(/^"|"$/g, '') || '🕌',
                        text: parts[3]?.replace(/^"|"$/g, '') || '',
                        userId: parts[4]?.replace(/^"|"$/g, '') || ''
                    });
                }
            }
            renderChatMessages(messages.slice(-50).reverse());
        } catch(e) {
            console.error('Ошибка загрузки чата:', e);
            document.getElementById('chatMessages').innerHTML = '<div class="loading">⚠️ Ошибка загрузки чата</div>';
        }
    }
